name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Static and structure checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run static checks
        run: bash Tests/check_static.sh

      - name: Check plugin package payload
        run: |
          test -f init.lua
          test -f lualib_bundle.lua
          test -f Script/Tools/SceneImGuiEditor.ts
          test -f Script/Tools/SceneImGuiEditor.lua
          test -f .dora/repo.json
